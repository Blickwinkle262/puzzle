services:
  node-app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 8787
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-Lax}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      PUBLIC_REGISTRATION_ENABLED: ${PUBLIC_REGISTRATION_ENABLED:-false}
      ADMIN_USERNAME_FALLBACK_ENABLED: ${ADMIN_USERNAME_FALLBACK_ENABLED:-false}
      ADMIN_BOOTSTRAP_TOKEN: ${ADMIN_BOOTSTRAP_TOKEN:-}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      STORY_CONTENT_ROOT: ${STORY_CONTENT_ROOT:-/app/backend/data/generated/content/stories}
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-admin}
      MAX_GENERATION_JOBS: ${MAX_GENERATION_JOBS:-100}
      STORY_GENERATOR_WORKER_TOKEN: ${STORY_GENERATOR_WORKER_TOKEN:?STORY_GENERATOR_WORKER_TOKEN is required}
      STORY_GENERATOR_BOOK_SUMMARY_TIMEOUT_MS: ${STORY_GENERATOR_BOOK_SUMMARY_TIMEOUT_MS:-7200000}
      STORY_GENERATOR_OUTPUT_ROOT: ${STORY_GENERATOR_OUTPUT_ROOT:-/app/backend/data/generated/content/stories}
      STORY_GENERATOR_INDEX_FILE: ${STORY_GENERATOR_INDEX_FILE:-/app/backend/data/generated/content/stories/index.json}
      STORY_GENERATOR_LOG_DIR: ${STORY_GENERATOR_LOG_DIR:-/app/backend/data/generated/logs/story_generator}
      STORY_GENERATOR_SUMMARY_DIR: ${STORY_GENERATOR_SUMMARY_DIR:-/app/backend/data/generated/summaries/story_generator}
      BOOK_INGEST_DB_PATH: ${BOOK_INGEST_DB_PATH:-/app/backend/data/books/books.sqlite}
    volumes:
      - puzzle_data:/app/backend/data
      - ./scripts/book_ingest/data:/app/backend/data/books
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      default:
        aliases:
          - backend

  story-worker:
    build:
      context: .
      dockerfile: deploy/worker/Dockerfile
    environment:
      PYTHONPATH: /app
      AIHUBMIX_API_KEY: ${AIHUBMIX_API_KEY:-}
      STORY_GENERATOR_BACKEND_URL: ${STORY_GENERATOR_BACKEND_URL:-http://backend:8787}
      STORY_GENERATOR_WORKER_TOKEN: ${STORY_GENERATOR_WORKER_TOKEN:?STORY_GENERATOR_WORKER_TOKEN is required}
      STORY_GENERATOR_QUEUE_POLL_SECONDS: ${STORY_GENERATOR_QUEUE_POLL_SECONDS:-2}
      STORY_GENERATOR_OUTPUT_ROOT: ${STORY_GENERATOR_OUTPUT_ROOT:-/app/backend/data/generated/content/stories}
      STORY_GENERATOR_INDEX_FILE: ${STORY_GENERATOR_INDEX_FILE:-/app/backend/data/generated/content/stories/index.json}
      STORY_GENERATOR_LOG_DIR: ${STORY_GENERATOR_LOG_DIR:-/app/backend/data/generated/logs/story_generator}
      STORY_GENERATOR_SUMMARY_DIR: ${STORY_GENERATOR_SUMMARY_DIR:-/app/backend/data/generated/summaries/story_generator}
      BOOK_INGEST_DB_PATH: ${BOOK_INGEST_DB_PATH:-/app/backend/data/books/books.sqlite}
    volumes:
      - puzzle_data:/app/backend/data
      - ./scripts/book_ingest/data:/app/backend/data/books
    depends_on:
      node-app:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - ${WEB_PORT:-8080}:80
    depends_on:
      node-app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  puzzle_data:
